<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Iron Pathway</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header class="header">
<h1>🛡 Iron Pathway</h1>
<p id="date"></p>
</header>

<!-- DASHBOARD -->

<section id="dashboard" class="tab">

<div class="hero-card">

<div class="streak-ring">
<span id="streak">0</span>
</div>

<p>Workout Streak</p>

</div>

<div class="grid">

<div class="card">

<h3>⚖ Weight</h3>

<input id="weightInput" placeholder="Enter weight">

<button onclick="saveWeight()">Save</button>

</div>

<div class="card">

<h3>🍗 Protein</h3>

<input id="proteinInput" placeholder="Protein grams">

<button onclick="saveProtein()">Save</button>

</div>

</div>

<div class="card">

<h2>Today's Workout</h2>

<ul id="todayWorkout"></ul>

<button onclick="generateWorkout()">Generate Workout</button>

</div>

</section>

<!-- WORKOUT TAB -->

<section id="workout" class="tab" style="display:none">

<h2>Your Workout</h2>

<div id="exerciseContainer"></div>

</section>

<!-- NUTRITION -->

<section id="nutrition" class="tab" style="display:none">

<div class="card">

<h2>Nutrition</h2>

<input id="caloriesInput" placeholder="Calories">

<button onclick="saveCalories()">Save</button>

</div>

</section>

<!-- PROGRESS -->

<section id="progress" class="tab" style="display:none">

<h2>Weight Progress</h2>

<canvas id="progressChart"></canvas>

</section>

<nav class="bottomNav">

<button onclick="showTab('dashboard')">Home</button>
<button onclick="showTab('workout')">Workout</button>
<button onclick="showTab('nutrition')">Nutrition</button>
<button onclick="showTab('progress')">Progress</button>

</nav>

<script src="app.js"></script>

</body>
</html>
